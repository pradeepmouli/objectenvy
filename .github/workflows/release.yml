name: Release

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Update npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Version packages and publish
        run: |
          CHANGESET_COUNT=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l)

          if [ "$CHANGESET_COUNT" -gt 0 ]; then
            echo "Found $CHANGESET_COUNT changesets, proceeding with publishing..."

            pnpm changeset status --output .changeset/status.json
            PACKAGES_TO_PUBLISH=$(jq -r '(.releases // []) | map(.name) | join(" ")' .changeset/status.json)
            echo "Packages to publish: $PACKAGES_TO_PUBLISH"

            pnpm changeset:version

            git add -A
            git commit -m "chore: version packages" || echo "No version changes to commit"
            git push origin master

            if [ -n "$PACKAGES_TO_PUBLISH" ] && [ "$PACKAGES_TO_PUBLISH" != "null" ]; then
              echo "Publishing packages: $PACKAGES_TO_PUBLISH"
              FILTER_ARGS=""
              for name in $PACKAGES_TO_PUBLISH; do
                FILTER_ARGS="$FILTER_ARGS --filter $name"
              done
              pnpm -r $FILTER_ARGS publish --provenance --access public --no-git-checks
            else
              echo "No packages to publish"
            fi
          else
            echo "No changesets found, skipping publication"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
